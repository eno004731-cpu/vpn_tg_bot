apiVersion: v1
kind: ConfigMap
metadata:
  name: vpn-bot-env
  namespace: vpn-prod
data:
  VPN_BOT_SECRETS_FILE: /etc/vpn-bot-secrets/runtime.toml
  VPN_BOT_PLANS_FILE: /app/config/plans.toml
  VPN_BOT_WEB_HOST: 0.0.0.0
  VPN_BOT_WEB_PORT: "8080"
  VPN_BOT_WORKER_METRICS_HOST: 0.0.0.0
  VPN_BOT_WORKER_METRICS_PORT: "9091"
  VPN_BOT_PUBLIC_WEBHOOK_BASE_URL: https://panel.swift-log.ru
---
apiVersion: v1
kind: Service
metadata:
  name: vpn-bot-web
  namespace: vpn-prod
  labels:
    app: vpn-bot-web
spec:
  selector:
    app: vpn-bot-web
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vpn-bot-web
  namespace: vpn-prod
spec:
  replicas: 2
  revisionHistoryLimit: 3
  minReadySeconds: 5
  progressDeadlineSeconds: 180
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: vpn-bot-web
  template:
    metadata:
      labels:
        app: vpn-bot-web
    spec:
      serviceAccountName: vpn-bot
      terminationGracePeriodSeconds: 60
      containers:
        - name: vpn-bot
          image: ghcr.io/eno004731-cpu/vpn_tg_bot:latest
          imagePullPolicy: IfNotPresent
          command:
            - vpn-bot
            - web
          envFrom:
            - configMapRef:
                name: vpn-bot-env
          volumeMounts:
            - name: runtime-secret
              mountPath: /etc/vpn-bot-secrets
              readOnly: true
          ports:
            - name: http
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: runtime-secret
          secret:
            secretName: vpn-bot-runtime
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: vpn-bot-web
  namespace: vpn-prod
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: vpn-bot-web
---
apiVersion: v1
kind: Service
metadata:
  name: vpn-bot-worker-metrics
  namespace: vpn-prod
  labels:
    app: vpn-bot-worker
spec:
  selector:
    app: vpn-bot-worker
  ports:
    - name: metrics
      port: 9091
      targetPort: metrics
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vpn-bot-worker
  namespace: vpn-prod
spec:
  replicas: 1
  revisionHistoryLimit: 3
  minReadySeconds: 5
  progressDeadlineSeconds: 180
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vpn-bot-worker
  template:
    metadata:
      labels:
        app: vpn-bot-worker
    spec:
      serviceAccountName: vpn-bot
      terminationGracePeriodSeconds: 60
      containers:
        - name: vpn-bot
          image: ghcr.io/eno004731-cpu/vpn_tg_bot:latest
          imagePullPolicy: IfNotPresent
          command:
            - vpn-bot
            - worker
          envFrom:
            - configMapRef:
                name: vpn-bot-env
          volumeMounts:
            - name: runtime-secret
              mountPath: /etc/vpn-bot-secrets
              readOnly: true
          ports:
            - name: metrics
              containerPort: 9091
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: runtime-secret
          secret:
            secretName: vpn-bot-runtime
