defaultRules:
  rules:
    kubeProxy: false

kubeProxy:
  enabled: false

prometheus:
  prometheusSpec:
    retention: 15d
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorNamespaceSelector: {}
    ruleSelectorNilUsesHelmValues: false
    ruleNamespaceSelector: {}

alertmanager:
  enabled: false
  alertmanagerSpec:
    configSecret: alertmanager-vpn-bot

grafana:
  enabled: true
