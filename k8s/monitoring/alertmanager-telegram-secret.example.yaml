apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-vpn-bot
  namespace: monitoring
type: Opaque
stringData:
  alertmanager.yaml: |
    global:
      resolve_timeout: 5m
    route:
      receiver: telegram
      group_by: ["alertname", "namespace"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
    receivers:
      - name: telegram
        telegram_configs:
          - bot_token: "PUT_TELEGRAM_BOT_TOKEN_HERE"
            chat_id: 123456789
            parse_mode: HTML
            message: |
              <b>{{ .Status | toUpper }}</b>
              {{ range .Alerts }}
              <b>{{ .Labels.alertname }}</b>
              {{ .Annotations.summary }}
              {{ .Annotations.description }}
              {{ end }}
