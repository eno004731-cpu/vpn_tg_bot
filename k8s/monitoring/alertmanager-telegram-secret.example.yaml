apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-vpn-bot
  namespace: monitoring
type: Opaque
stringData:
  alertmanager.yaml: |
    global:
      resolve_timeout: 5m
    route:
      receiver: "null"
      group_by: ["alertname", "namespace", "severity"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - receiver: "null"
          matchers:
            - 'severity=""'
        - receiver: "null"
          matchers:
            - 'severity="none"'
        - receiver: "null"
          matchers:
            - 'alertname=~"InfoInhibitor|Watchdog|KubeProxyDown|KubeControllerManagerDown|KubeSchedulerDown|KubeEtcdDown"'
        - receiver: telegram
          matchers:
            - 'alertname=~"VpnBotReadyzDown|VpnBotWebhookErrorsHigh|VpnBotProvisionFailuresPresent|VpnBotJobsStuck|VpnBotWorkerDown|PostgresDown|VaultDown|PodCrashLooping|HighCpuOrMemoryUsage|VpnBotBackupJobFailed|K3sNodeNotReady|NodeCpuHigh|NodeMemoryHigh|NodeDiskSpaceLow|VpnBotTestAlert"'
            - 'severity=~"critical|warning"'
    receivers:
      - name: "null"
      - name: telegram
        telegram_configs:
          - bot_token: "PUT_TELEGRAM_BOT_TOKEN_HERE"
            chat_id: 123456789
            parse_mode: HTML
            send_resolved: true
            message: |
              <b>{{ .Status | toUpper }}</b> {{ if .CommonLabels.severity }}[{{ .CommonLabels.severity }}]{{ end }}
              {{ range .Alerts }}
              <b>{{ .Labels.alertname }}</b>
              {{ .Annotations.summary }}
              {{ .Annotations.description }}
              {{ end }}
