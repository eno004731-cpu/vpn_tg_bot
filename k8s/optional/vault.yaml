apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-config
  namespace: vpn-prod
data:
  server.hcl: |
    ui = true
    disable_mlock = true

    storage "file" {
      path = "/vault/data"
    }

    listener "tcp" {
      address = "0.0.0.0:8200"
      tls_disable = 1
    }
---
apiVersion: v1
kind: Service
metadata:
  name: vault
  namespace: vpn-prod
spec:
  selector:
    app: vault
  ports:
    - name: http
      port: 8200
      targetPort: http
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vault
  namespace: vpn-prod
spec:
  serviceName: vault
  replicas: 1
  selector:
    matchLabels:
      app: vault
  template:
    metadata:
      labels:
        app: vault
    spec:
      containers:
        - name: vault
          image: hashicorp/vault:1.15
          args:
            - server
            - -config=/vault/config/server.hcl
          ports:
            - name: http
              containerPort: 8200
          env:
            - name: VAULT_ADDR
              value: http://127.0.0.1:8200
          volumeMounts:
            - name: vault-config
              mountPath: /vault/config
              readOnly: true
            - name: vault-data
              mountPath: /vault/data
          readinessProbe:
            httpGet:
              path: /v1/sys/health?standbyok=true&sealedcode=204&uninitcode=204
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: vault-config
          configMap:
            name: vault-config
  volumeClaimTemplates:
    - metadata:
        name: vault-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
