[app]
bot_token = "123456:telegram-bot-token"
admin_ids = [123456789]
database_path = "data/bot.sqlite3"
sync_interval_seconds = 300

[payment]
bank_name = "Demo Bank"
receiver_name = "Demo User"
card_number = "0000000000000000"
phone = "+10000000000"
invoice_lifetime_hours = 12
instruction_hint = "Переведите точную сумму по СБП на телефон или по номеру карты, затем нажмите кнопку в боте."

[traffic_policy]
enabled = true
daily_limit_gb = 75
throttled_speed_kbytes_per_second = 1250
timezone = "Europe/Moscow"

[xui]
# Старый формат одной ноды остаётся рабочим.
node_code = "main"
base_url = "https://panel.example.com/secret-path"
username = "admin"
password = "super-secret"
inbound_id = 1
public_host = "vpn.example.com"
public_port = 443
verify_tls = true
fingerprint = "chrome"
flow = "xtls-rprx-vision"
spider_x = "/"

