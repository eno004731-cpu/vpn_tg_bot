name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to production server
    runs-on: [self-hosted, Linux, X64, vpn-bot, prod]

    env:
      APP_DIR: /opt/vpn-bot
      DEFAULT_DEPLOY_MODE: webhook
      DEPLOY_MODE: ${{ vars.VPN_BOT_DEPLOY_MODE }}
      DEFAULT_K8S_NAMESPACE: vpn-prod
      K8S_NAMESPACE: ${{ vars.VPN_BOT_K8S_NAMESPACE }}
      DEFAULT_K8S_RUNTIME_SECRET: vpn-bot-runtime
      K8S_RUNTIME_SECRET: ${{ vars.VPN_BOT_K8S_RUNTIME_SECRET }}
      DEFAULT_K8S_IMAGE_REPO: ghcr.io/eno004731-cpu/vpn_tg_bot
      K8S_IMAGE_REPO: ${{ vars.VPN_BOT_K8S_IMAGE_REPO }}

    steps:
      - name: Checkout for checks
        uses: actions/checkout@v4

      - name: Run secret scan
        run: python3 scripts/check_secrets.py

      - name: Install test dependencies
        run: |
          python3 -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install ".[dev]"

      - name: Run code checks
        run: |
          .venv/bin/ruff format --check .
          .venv/bin/ruff check .
          .venv/bin/pytest -q

      - name: Sync application directory
        run: |
          set -euo pipefail

          if [ ! -d "$APP_DIR" ]; then
            if [ ! -w "$(dirname "$APP_DIR")" ]; then
              echo "::error::$(dirname "$APP_DIR") is not writable by $USER. Create $APP_DIR once on the server and chown it to github-runner."
              exit 1
            fi
            mkdir -p "$APP_DIR"
          fi

          if [ ! -w "$APP_DIR" ]; then
            echo "::error::$APP_DIR is not writable by $USER. Run: chown -R github-runner:github-runner $APP_DIR"
            exit 1
          fi

          cd "$APP_DIR"

          if [ ! -d .git ]; then
            git init
            git remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY.git"
          else
            git remote set-url origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY.git"
          fi

          git fetch --prune origin main
          git checkout -B main origin/main
          git reset --hard "$GITHUB_SHA"

      - name: Resolve deployment settings
        id: deploy-settings
        run: |
          set -euo pipefail
          deploy_mode="${DEPLOY_MODE:-$DEFAULT_DEPLOY_MODE}"
          namespace="${K8S_NAMESPACE:-$DEFAULT_K8S_NAMESPACE}"
          runtime_secret="${K8S_RUNTIME_SECRET:-$DEFAULT_K8S_RUNTIME_SECRET}"
          image_repo="${K8S_IMAGE_REPO:-$DEFAULT_K8S_IMAGE_REPO}"

          case "$deploy_mode" in
            webhook|polling|k8s) ;;
            *)
              echo "::error::Unsupported deploy mode: $deploy_mode"
              exit 1
              ;;
          esac

          {
            echo "deploy_mode=$deploy_mode"
            echo "namespace=$namespace"
            echo "runtime_secret=$runtime_secret"
            echo "image_repo=$image_repo"
          } >> "$GITHUB_OUTPUT"

      - name: Install app and migrate database
        if: steps.deploy-settings.outputs.deploy_mode == 'webhook' || steps.deploy-settings.outputs.deploy_mode == 'polling'
        run: |
          set -euo pipefail
          cd "$APP_DIR"
          python3 -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -e .
          .venv/bin/python -m vpn_bot init-db

      - name: Install systemd service units
        if: steps.deploy-settings.outputs.deploy_mode == 'webhook' || steps.deploy-settings.outputs.deploy_mode == 'polling'
        run: |
          set -euo pipefail
          sudo -n "$APP_DIR/ops/systemd/install_bot_units.sh" "${{ steps.deploy-settings.outputs.deploy_mode }}"

      - name: Restart bot services
        if: steps.deploy-settings.outputs.deploy_mode == 'webhook' || steps.deploy-settings.outputs.deploy_mode == 'polling'
        run: |
          set -euo pipefail
          sudo -n "$APP_DIR/ops/systemd/restart_bot_services.sh" "${{ steps.deploy-settings.outputs.deploy_mode }}"

      - name: Roll out bot in k3s
        if: steps.deploy-settings.outputs.deploy_mode == 'k8s'
        run: |
          set -euo pipefail
          sudo -n "$APP_DIR/ops/k3s/rollout_bot.sh" \
            "$GITHUB_SHA" \
            "${{ steps.deploy-settings.outputs.namespace }}" \
            "${{ steps.deploy-settings.outputs.runtime_secret }}" \
            "${{ steps.deploy-settings.outputs.image_repo }}"

      - name: Disable systemd bot services after k8s rollout
        if: steps.deploy-settings.outputs.deploy_mode == 'k8s'
        run: |
          set -euo pipefail
          sudo -n "$APP_DIR/ops/systemd/restart_bot_services.sh" k8s

      - name: Deployment summary
        run: |
          {
            echo "## Deploy complete"
            echo ""
            echo "- Commit: \`$GITHUB_SHA\`"
            echo "- App dir: \`$APP_DIR\`"
            echo "- Deploy mode: \`${{ steps.deploy-settings.outputs.deploy_mode }}\`"
            echo "- K8s namespace: \`${{ steps.deploy-settings.outputs.namespace }}\`"
            echo "- K8s runtime secret: \`${{ steps.deploy-settings.outputs.runtime_secret }}\`"
            echo "- K8s image repo: \`${{ steps.deploy-settings.outputs.image_repo }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
