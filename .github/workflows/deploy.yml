name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to production server
    runs-on: [self-hosted, Linux, X64, vpn-bot, prod]

    env:
      APP_DIR: /opt/vpn-bot
      POLLING_SERVICE_NAME: vpn-bot
      WEBHOOK_SERVICE_NAMES: vpn-bot-web vpn-bot-worker

    steps:
      - name: Checkout for checks
        uses: actions/checkout@v4

      - name: Run secret scan
        run: python3 scripts/check_secrets.py

      - name: Install test dependencies
        run: |
          python3 -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install ".[dev]"

      - name: Run code checks
        run: |
          .venv/bin/ruff format --check .
          .venv/bin/ruff check .
          .venv/bin/pytest -q

      - name: Sync application directory
        run: |
          set -euo pipefail

          if [ ! -d "$APP_DIR" ]; then
            if [ ! -w "$(dirname "$APP_DIR")" ]; then
              echo "::error::$(dirname "$APP_DIR") is not writable by $USER. Create $APP_DIR once on the server and chown it to github-runner."
              exit 1
            fi
            mkdir -p "$APP_DIR"
          fi

          if [ ! -w "$APP_DIR" ]; then
            echo "::error::$APP_DIR is not writable by $USER. Run: chown -R github-runner:github-runner $APP_DIR"
            exit 1
          fi

          cd "$APP_DIR"

          if [ ! -d .git ]; then
            git init
            git remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY.git"
          else
            git remote set-url origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY.git"
          fi

          git fetch --prune origin main
          git checkout -B main origin/main
          git reset --hard "$GITHUB_SHA"

      - name: Install app and migrate database
        run: |
          set -euo pipefail
          cd "$APP_DIR"
          python3 -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -e .
          .venv/bin/python -m vpn_bot init-db

      - name: Restart bot services
        run: |
          set -euo pipefail

          found_services=""
          missing_services=""
          for service in $WEBHOOK_SERVICE_NAMES; do
            if systemctl cat "$service" >/dev/null 2>&1; then
              found_services="$found_services $service"
            else
              missing_services="$missing_services $service"
            fi
          done

          if [ -n "${found_services## }" ] && [ -n "${missing_services## }" ]; then
            echo "::error::Webhook mode is partially installed. Found:${found_services} Missing:${missing_services}"
            exit 1
          fi

          if [ -n "${found_services## }" ]; then
            if systemctl cat "$POLLING_SERVICE_NAME" >/dev/null 2>&1; then
              if systemctl is-active "$POLLING_SERVICE_NAME" >/dev/null 2>&1; then
                sudo -n systemctl stop "$POLLING_SERVICE_NAME"
              fi
              if systemctl is-enabled "$POLLING_SERVICE_NAME" >/dev/null 2>&1; then
                sudo -n systemctl disable "$POLLING_SERVICE_NAME"
              fi
            fi
            for service in $WEBHOOK_SERVICE_NAMES; do
              sudo -n systemctl restart "$service"
              sudo -n systemctl status "$service" --no-pager
            done
          else
            sudo -n systemctl restart "$POLLING_SERVICE_NAME"
            sudo -n systemctl status "$POLLING_SERVICE_NAME" --no-pager
          fi

      - name: Deployment summary
        run: |
          {
            echo "## Deploy complete"
            echo ""
            echo "- Commit: \`$GITHUB_SHA\`"
            echo "- App dir: \`$APP_DIR\`"
            echo "- Webhook services: \`$WEBHOOK_SERVICE_NAMES\`"
            echo "- Polling fallback service: \`$POLLING_SERVICE_NAME\`"
          } >> "$GITHUB_STEP_SUMMARY"
